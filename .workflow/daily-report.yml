version: '1.0'
name: pubg_daily_report
displayName: PUBG 每日战报
triggers:
  schedule:
    - cron: '0 30 8 * * ?'
stages:
  - name: generate_stage
    displayName: 采集生成战报
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@python
        name: daily_report
        displayName: 采集 → 生成 → 推送
        pythonVersion: '3.11'
        commands:
          - python3 --version
          - pip3 install -i https://pypi.org/simple/ -r requirements-dev.txt -q
          - ruff check .
          - python3 -m unittest discover -s tests -v
          - python3 fetch_data.py --pages 4
          - python3 pubg_daily_report.py
      - git config user.name "PUBG Bot"
      - git config user.email "pubg-bot@gitee.com"
      - git checkout main
      - git add data/ reports/
      - git diff --cached --quiet || (git commit -m "📊 每日战报 $(date +%Y-%m-%d)" && git push origin main)
